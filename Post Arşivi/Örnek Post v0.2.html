  <script type="text/vtt" class="cx-subtitles">
WEBVTT

01:17.161 --> 01:19.497
PLUMMERVILLE ATEŞ GİBİ!

01:33.135 --> 01:34.553
Burada onu yapamazsın.

01:40.518 --> 01:41.560
Pekâlâ.

01:41.811 --> 01:44.396
Siz neyin nesi, kimin fesisiniz?

01:46.065 --> 01:49.151
Biz mi? Biz…

01:50.986 --> 01:55.407
ÖNEMSİZ BİRİ 2

02:05.000 --> 02:06.752
PAZARTESİ

02:09.964 --> 02:11.298
Gözüne bir bakayım.

02:15.427 --> 02:16.554
Yemekte ne var? Tavuk

02:16.679 --> 02:17.847
Isıtırım. Üzgünüm.

02:23.519 --> 02:26.146
SALI

02:34.446 --> 02:36.532
ÇARŞAMBA

02:39.243 --> 02:40.953
-Görüşürüz tatlım.
-Görüşürüz anne.

02:44.748 --> 02:45.833
Neredesin?

02:45.958 --> 02:47.293
İşteyim

02:50.796 --> 02:52.381
PERŞEMBE

03:40.262 --> 03:41.805
Eve geliyor musun?

03:41.889 --> 03:46.143
Eve geliyor musun?

03:55.653 --> 03:56.946
Yemeğe yetişirim

03:57.071 --> 03:58.364
Eve geliyor musun?

03:58.489 --> 04:00.407
Gecikeceğim, bekleme.

04:00.532 --> 04:02.701
Konuşmamız lazım

04:21.845 --> 04:23.013
tamam. S seviyorum.

04:29.853 --> 04:33.399
Ben de seni

04:34.733 --> 04:38.320
CUMA

04:38.445 --> 04:40.739
Sammy, meyveni ye lütfen.

04:40.864 --> 04:41.865
Tamam, yerim.

04:41.949 --> 04:43.283
Brady, yumurtanı bitir.

04:43.409 --> 04:44.702
Ben doydum.

04:45.411 --> 04:46.954
Tabağını kaldır lütfen.

04:47.079 --> 04:48.080
Babanınkini aldın ama.

04:48.580 --> 04:50.249
-Evde mi ki?
-Hoşça kal Lazanya.

04:50.749 --> 04:53.419
-Babana haksızlık etme.
-Ne zaman ettim ki?

04:54.336 --> 04:55.337
Dur bir saniye.

04:55.713 --> 04:56.880
-Seni seviyorum.
-Ben de seni.

04:57.006 --> 04:58.507
-Merhaba tatlım.
-Arkadaşlarım geldi.

04:58.632 --> 05:00.634
Peki. Sana iyi…

05:02.511 --> 05:06.098
Merhaba tatlım, seni uyandırmamak için
bodrumda uyudum.

05:07.725 --> 05:10.185
Brady nerede?
Maçı nasıl geçti, merak ediyorum.

05:11.603 --> 05:12.604
Şöyle geçti…

05:14.565 --> 05:17.693
Diğer takım, nasıl desem,
epey sert oynadı.

05:17.985 --> 05:19.611
-Hadi ya.
-Evet, o yüzden…

05:21.113 --> 05:22.281
Neyse, kendi anlatsın.

05:22.656 --> 05:23.657
Bugün çok yoğunum.

05:23.741 --> 05:26.952
Üç müşterime ev gezdireceğim,
bir tane de satışım var.

05:27.870 --> 05:28.871
Son olarak…

05:30.372 --> 05:32.124
Kahveni Brady aldı. Kendine kahve yap.

05:32.207 --> 05:34.293
-Ama…
-Hutch, yüzün kanıyor.

05:36.045 --> 05:37.504
Peki o zaman…

05:42.801 --> 05:43.802
Lanet olsun!

05:44.219 --> 05:45.220
Hop!

05:46.013 --> 05:47.056
Birader!

05:48.265 --> 05:49.266
Şunu da al.

05:49.349 --> 05:50.350
Güle güle anne.

05:50.434 --> 05:51.435
Sağ ol.

05:51.518 --> 05:52.644
İyi günler!

05:52.770 --> 05:53.771
Güle güle!

05:55.814 --> 05:57.399
-Selam millet.
-Selam Sammy.

05:57.524 --> 05:59.777
-Ayakkabılar yakıyor.
-Seninkiler de çok güzel.

05:59.902 --> 06:03.197
-Seninkiler de.
-Sağ ol. AVM'den aldım.

06:03.322 --> 06:05.616
-Yazın bir yere gidiyor musunuz?
-Evet, gidiyoruz.

06:05.741 --> 06:06.950
Ben de…

06:11.413 --> 06:12.414
Hutch?

06:14.458 --> 06:15.459
Ne haber tatlım?

06:16.335 --> 06:17.503
Şey diyecektim…

06:21.381 --> 06:25.010
Yaz tatiline birkaç gün kaldı ve…

06:25.135 --> 06:27.721
Ailecek bir yere gitmeliyiz. Evet.

06:27.930 --> 06:30.224
Ben bir plan yaparım.

06:30.349 --> 06:33.477
Bugün yaparım hatta
ve akşama yemekte sana söylerim.

06:33.602 --> 06:35.020
Lazanya yaparım.

06:35.187 --> 06:37.898
-Tabii, yaparsın.
-Gerçekten, çok ciddiyim…

06:37.981 --> 06:40.776
Bugün bir görevim var.

06:41.443 --> 06:43.529
Ama akşama gelince görürsün…

06:44.279 --> 06:46.115
Tüm plan hazır olacak.

06:55.666 --> 06:57.000
Ne oldu?

07:00.963 --> 07:02.005
Boş ver.

07:50.512 --> 07:51.972
HİZMET DIŞI

08:12.659 --> 08:13.827
Nihayet gelebildin.

08:25.839 --> 08:27.799
Zor bir gün geçirdin galiba.

08:28.842 --> 08:32.638
Bana aksettirilenden çok daha

08:32.763 --> 08:34.264
büyük bir görevdi.

08:36.350 --> 08:37.643
Veri kartı.

08:47.402 --> 08:49.738
Basit bir kapkaç göreviydi.

08:49.863 --> 08:53.116
İlk başta öyleydi.

08:54.451 --> 08:56.745
Konferansta eğleniyor musunuz bakalım?

08:57.829 --> 09:01.833
Yavşak herif,
biz konferansa falan gelmedik.

09:05.629 --> 09:06.630
Kart nerede?

09:17.724 --> 09:18.767
Eyvah eyvah.

09:29.736 --> 09:30.737
Siktir!

09:33.699 --> 09:34.700
ACİL YARDIM

09:34.783 --> 09:36.368
İmdat! Yardım gönderin! Biz…

09:36.493 --> 09:38.537
<i>Birazdan operatöre bağlanacaksınız…</i>

10:28.462 --> 10:30.672
Tamam işte. Basit bir kapkaç.

10:30.756 --> 10:34.134
Tabii. Korsikalılar ellerinde
UZI'lerle peyda olana dek öyleydi.

10:39.639 --> 10:42.184
Pardon. MP7'lerle demek istedim.

10:55.280 --> 10:57.657
-Korsikalılar mı?
-Ellerinde MP7'lerle.

10:58.784 --> 11:02.621
Başka bir grubun da kartın peşinde
olabileceğini tahmin ediyorduk.

11:03.372 --> 11:04.456
Sadece bir grup mu?

11:36.655 --> 11:38.240
-Brezilyalılar.
-Evet.

11:39.032 --> 11:40.492
Palalı.

11:40.826 --> 11:41.952
Hem de keskin.

11:51.336 --> 11:52.379
Eyvah eyvah.

11:52.671 --> 11:55.090
Eyvah ki ne eyvah.

12:03.181 --> 12:06.393
Bence tüm çabalarına değdi
zira kart hakiki.

12:07.769 --> 12:10.814
Yani borcunun 800.000 dolarını
daha ödemiş oldun.

12:13.358 --> 12:15.318
Peki ne kadar kaldı?

12:16.319 --> 12:18.321
Aşağı yukarı 30 milyon.

12:24.035 --> 12:26.037
Sıradaki görevin.

12:32.586 --> 12:33.670
Yapamam.

12:36.298 --> 12:40.010
Hutch. Borcunu kapatmana
yardım etmeye çalışıyorum.

12:40.135 --> 12:43.346
Hani şu Rusların paralarını yaktığında

12:43.472 --> 12:46.516
senin adına cömertçe ödediğimiz
borçtan bahsediyorum.

12:51.271 --> 12:52.564
Bu hızda devam edersen

12:53.398 --> 12:56.067
Obshak borcunu
baharda kapatmış olursun.

12:56.943 --> 12:59.446
Benim bir ta…

13:00.447 --> 13:02.365
Ben bir ara vermek istiyorum.

13:16.838 --> 13:18.173
Bol şans.

13:21.968 --> 13:23.637
Şansı ne yapayım?

13:24.054 --> 13:26.598
Ara vermek isteyen sen değil misin?

13:28.350 --> 13:30.435
Bu iş senin tabiatında var

13:31.019 --> 13:33.855
ve tabiat her zaman galip gelir.

13:35.857 --> 13:37.150
Nereye gidersen git…

13:40.445 --> 13:41.863
…yine kendini bulacaksın.

13:59.548 --> 14:02.592
Plummervılle'de dehşet
bir tatil geçirdim!

14:09.140 --> 14:11.017
<i>Eğlence sizi bekliyor.</i>

14:11.142 --> 14:15.272
<i>Bu yaz istikameti Plummerville'e</i>
<i>çevirin ve Vahşi Bill'e katılıp</i>

14:15.397 --> 14:18.984
<i>Amerika'nın göbeğinde</i>
<i>eğlencenin dibine vurun!</i>

14:19.526 --> 14:21.778
<i>Muazzam bir lunaparkımız var.</i>

14:22.821 --> 14:28.618
<i>Dahası, Amerika'nın ilk</i>
<i>ve en muhteşem su parkı burada!</i>

14:30.161 --> 14:31.746
<i>Eğleniyor musunuz çocuklar?</i>

14:31.871 --> 14:33.873
<i>Hem de nasıl Bay Vahşi Bill!</i>

14:34.541 --> 14:38.753
<i>Kilometrelerce uzayan</i>
<i>kaydıraklarımız var!</i>

14:39.212 --> 14:42.299
<i>Çünkü Plummerville demek</i>

14:43.800 --> 14:45.760
<i>yaz tatili demektir!</i>

14:45.885 --> 14:50.640
<i>Bir gelen buranın hastası olur!</i>

14:50.765 --> 14:52.684
<i>…hastası olur!</i>

14:54.686 --> 14:55.687
İşte burası.

14:56.313 --> 14:59.232
Bu reklam çok eski.
Hâlâ duruyor mudur?

14:59.357 --> 15:00.734
Baktım, aynen duruyor.

15:00.859 --> 15:05.530
Otel, su parkı, ördek tekneler,
lunapark, hepsi orada.

15:05.655 --> 15:06.906
Ördek tekne nedir?

15:07.073 --> 15:12.203
Şey… Yüzen bir otobüs gibi düşün.
Aslen askerî bir araç.

15:12.329 --> 15:15.123
-Deden bayılacak.
-Baban da mı geliyor?

15:15.248 --> 15:18.168
-Dedem de mi geliyor?
-Herhâlde yani.

15:18.293 --> 15:21.296
Bir şey diyeceğim,
ben evde kalmaya gönüllü oluyorum.

15:21.421 --> 15:22.964
Hiç boşuna heveslenme.

15:23.089 --> 15:25.550
Brady, inan bana,
bu hayatındaki en eğlenceli…

15:25.925 --> 15:26.926
Gözüne ne oldu?

15:29.012 --> 15:30.847
Maçta faul yaptılar.

15:31.222 --> 15:32.223
Ne maçı?

15:33.058 --> 15:34.267
Kaçırdığın maç.

15:34.392 --> 15:35.393
Haklısın.

15:35.477 --> 15:38.480
-Ailecek daha çok vakit geçirmeliyiz.
-Evet.

15:38.605 --> 15:40.940
Burası çocukluğunda gittiğin
yerlerden biri.

15:41.066 --> 15:44.277
Öyle deyince sanki çok yere gitmişim
gibi algılanıyor.

15:44.402 --> 15:48.698
Babam bizi sadece bir kez
tatile götürdü, o da Plummerville'e.

15:51.701 --> 15:52.786
Bakın…

15:54.412 --> 15:57.248
Hayatta işler zora girdiğinde

15:57.374 --> 16:02.087
size güç vermesi için
mutlu anılara ihtiyaç duyarsınız.

16:02.212 --> 16:05.423
Ben de sizi hayatta beni
en çok mutlu eden yere götürmek,

16:05.548 --> 16:09.135
sizin için de anılar yaratmak
istiyorum. İzin verir misiniz?

16:12.931 --> 16:14.766
Merhaba Lazanya.

16:15.892 --> 16:17.102
Pekâlâ.

16:17.852 --> 16:19.813
-Tamam Hutch, olur.
-Sahiden mi?

16:19.938 --> 16:21.106
-Evet.
-Gerçekten mi?

16:21.231 --> 16:22.232
Evet.

16:22.857 --> 16:24.776
-Ne?
-Çocuklar, macera olur.

16:24.901 --> 16:25.902
Macera ha?

16:25.985 --> 16:27.153
-Evet.
-İşte bu.

16:35.662 --> 16:39.666
Hangi gündü hatırlamıyorum

16:39.749 --> 16:40.834
Dede!

16:42.544 --> 16:43.878
Selam baba.

16:44.003 --> 16:46.589
Puronu söndür.
Pasif içicilik diye bir şey var.

16:51.344 --> 16:53.179
Yok öyle bir şey.

16:54.764 --> 16:57.851
Tüm hayallerim gerçekleşirse eğer

16:57.934 --> 17:02.021
Zamanımı seninle geçireceğim

17:03.273 --> 17:04.983
Ver elini tatil!

17:10.655 --> 17:12.824
Hutch, marşa bas.

17:13.116 --> 17:14.576
-Buradan mı?
-Evet.

17:15.702 --> 17:18.413
Seni her öptüğümde

17:18.496 --> 17:22.292
Aklım başımdan gidiyor

17:22.375 --> 17:24.544
Tüm hayallerim gerçekleşirse eğer

17:24.919 --> 17:28.381
Zamanımı seninle geçireceğim

17:28.506 --> 17:34.262
Dünden fazla seviyorum seni

17:36.556 --> 17:42.729
Ama yarın daha da fazla seveceğim

17:42.812 --> 17:47.692
Dünden fazla seviyorum seni

17:47.817 --> 17:49.444
PlummerVille'e hoş geldiniz

17:49.527 --> 17:52.322
Ama aşkım yarın daha da fazla seveceğim

17:52.405 --> 17:55.158
Plummerville'de tatil yapılır!

17:56.326 --> 17:59.704
Her yeni günde

17:59.788 --> 18:02.415
Seni her an seviyorum

18:03.124 --> 18:05.543
Hep bir farklı seviyorum

18:05.627 --> 18:08.838
En eski su parkı mı?
Bence övünülecek bir şey değil ama…

18:08.963 --> 18:11.257
Yani tarihî işte.

18:12.175 --> 18:14.803
Çocuklar, sizin odanız burası.

18:16.429 --> 18:17.806
Demek paylaşıyoruz.

18:19.015 --> 18:20.266
Dedem nerede kalacak?

18:20.391 --> 18:22.143
Yan odada.

18:22.268 --> 18:24.687
Bence bu yaştan sonra
aynı odada kalamazlar.

18:25.355 --> 18:26.981
Maalesef kalacaklar.

18:27.106 --> 18:29.275
Birlikte eski kulübede kalabiliriz.

18:29.400 --> 18:31.486
Yok, olmaz.

18:32.403 --> 18:34.239
O zaman ben tek başıma kalırım.

18:34.781 --> 18:37.450
Benim odamda sen kalabilirsin.

18:37.742 --> 18:38.993
-Teşekkürler.
-Harika.

18:39.118 --> 18:41.204
O hâlde Sammy, bu oda sana kaldı.

18:43.832 --> 18:45.708
Balayı süiti.

18:45.834 --> 18:49.587
İşte bu be!
Şu odanın güzelliğine bakar mısın?

18:52.674 --> 18:55.885
Nasıl ama, iyice keyfini çıkar.

18:56.177 --> 18:57.428
Evet.

18:59.931 --> 19:03.268
Mercimeğin fırına verildiği yer
burası işte.

19:04.727 --> 19:05.812
Evet.

19:09.691 --> 19:10.859
Beğenmedin mi?

19:10.984 --> 19:12.777
Yo, iyice keyfini çıkarıyorum.

19:12.902 --> 19:15.864
Puro kokusu alıyorum.

19:17.031 --> 19:21.578
Ama sen mutlusun
ve hep birlikteyiz diye çok mutluyum.

19:22.620 --> 19:24.455
Harika bir tatil olacak.

19:29.043 --> 19:30.795
Su parkı zamanı!

19:33.756 --> 19:35.258
-Evet, su parkı.
-Gidelim.

19:53.484 --> 19:54.485
Burası cennet.

19:54.569 --> 19:56.070
Tropikal bölgelerle

19:57.113 --> 19:59.324
Avrupa'nın karışımı gibi.

20:00.909 --> 20:01.910
Merhaba.

20:01.993 --> 20:04.203
-Kapalıyız, üzgünüm.
-Ne?

20:04.871 --> 20:07.248
Bir kaza oldu.
Günün geri kalanında kapalıyız.

20:07.373 --> 20:08.875
-Ne kadarlığına?
-24 saat.

20:09.000 --> 20:11.377
Sosisli kuponu takdim edeyim.
Yine bekleriz.

20:11.502 --> 20:13.254
-Üzgünüm.
-Çok salakça.

20:13.379 --> 20:17.759
Ben kaçar çocuklar.
Gidip eski kulübeye bakayım.

20:18.551 --> 20:19.552
Sosisli.

20:24.891 --> 20:27.518
<i>Harry, baban yemekleri getiriyor.</i>

20:28.853 --> 20:30.521
<i>Ne haber Hutch?</i>

20:36.819 --> 20:39.781
<i>Mansell'lerin büyük aile tatiline</i>
<i>hoş geldiniz.</i>

20:40.490 --> 20:42.241
<i>Bir de kulübeyi görün hele.</i>

20:43.242 --> 20:45.745
<i>Bu sosisliler de</i>
<i>serçe parmağım kadarmış.</i>

20:48.414 --> 20:50.416
Bir derdin mi var birader?

20:53.503 --> 20:54.671
Bir derdin mi var?

20:57.173 --> 20:59.842
Pardon, dalmışım.

21:09.560 --> 21:12.605
Kolluk kuvvetlerine
trene bakar gibi bakmak ayıptır.

21:14.399 --> 21:17.235
-Kusura bakmayın Memur Bey.
-Bana Şerif diyeceksin.

21:18.319 --> 21:20.238
Yanlış bir şey mi yaptım?

21:20.363 --> 21:21.489
Bilmem.

21:24.784 --> 21:25.785
Yaptın mı?

21:28.621 --> 21:29.622
Hutch?

21:30.331 --> 21:31.582
Bir şey yok tatlım.

21:31.708 --> 21:32.750
Peki.

21:33.376 --> 21:34.377
Mansell?

21:35.586 --> 21:36.671
Benim.

21:36.796 --> 21:38.339
-Sosisliler hazır.
-Teşekkürler.

21:38.464 --> 21:39.507
Rica ederim.

21:39.632 --> 21:41.634
-Harika.
-Afiyet olsun.

21:41.759 --> 21:42.760
Teşekkürler.

21:48.933 --> 21:51.144
Beklediğimize değdi.
Bir de şuna bakın.

21:52.020 --> 21:54.147
Atari salonu için kupon.

21:54.272 --> 21:56.399
-Tuzağa böyle düşürüyorlar.
-Aynen.

21:56.524 --> 21:58.067
-Bakabilir miyim?
-Tamam.

21:58.192 --> 22:00.862
Dört ana gıda grubu tek pakette.

22:00.987 --> 22:01.988
Sağ ol anne.

22:11.956 --> 22:15.334
Anlaşılan maçta gözün morarmış,
bunu konuşalım.

22:16.502 --> 22:17.545
…olmadı.

22:18.254 --> 22:21.466
-Efendim, ne?
-Dedim ki maçta olmadı.

22:23.384 --> 22:25.011
Ama faul yaptılar, değil mi?

22:25.136 --> 22:28.848
Baba, kes şunu. Bırak da…
Bırak da biraz eğleneyim.

22:28.973 --> 22:30.183
Büyütecek bir şey yok.

22:30.308 --> 22:31.476
Gel, şuna bir bak.

22:31.601 --> 22:32.852
Ben galip geldim.

22:32.977 --> 22:34.812
-Hutch!
-Ama bu hiç…

22:35.271 --> 22:37.440
-Tamam. Geliyorum.
-Kazananla oyna!

22:37.565 --> 22:38.900
Hemen geliyorum.

22:40.526 --> 22:42.528
Bu konuyu sonra konuşacağız,
tamam mı?

22:42.653 --> 22:44.238
-Kesinlikle.
-Olur.

22:52.622 --> 22:54.415
<i>Selam gençler.</i>

22:54.540 --> 22:57.752
<i>Tatil beldemizin atari salonu</i>
<i>yediden yetmişe herkes için</i>

22:57.877 --> 23:00.129
<i>eğlencenin bir numaralı adresi.</i>

23:00.254 --> 23:01.255
Bilet ister misiniz?

23:01.339 --> 23:04.050
<i>-Köstebek Vurmaca'da indirim var.</i>
-Tabii.

23:04.175 --> 23:06.052
-Al.
-Sağ ol.

23:06.177 --> 23:07.178
Bende çok var.

23:07.261 --> 23:09.889
Brady, biletleri niye verdin?

23:10.014 --> 23:12.183
Daha çok var. Gel.

23:12.308 --> 23:15.603
<i>Happy Hour'a bir saat kaldı.</i>

23:18.272 --> 23:21.692
Biz bu işi biliyoruz ya,
tam tatil moduna girdik.

23:22.735 --> 23:24.862
Evet, girdik gibi.

23:24.987 --> 23:26.823
-Şuradaki porsuk mu?
-Evet.

23:27.323 --> 23:29.033
-O, evet.
-Tamam.

23:30.284 --> 23:31.285
Baksana.

23:31.369 --> 23:32.370
Teşekkürler.

23:32.453 --> 23:33.454
İnek.

23:34.205 --> 23:36.249
Kazandığın biletlerle inek mi aldın?

23:38.960 --> 23:39.961
Ne dedin?

23:40.253 --> 23:41.712
Özür dile.

23:43.589 --> 23:44.590
Ne için?

23:44.674 --> 23:46.092
Sevgilime asıldığın için.

23:46.217 --> 23:47.635
-Ona bilet verdin.
-Teşekkürler.

23:47.760 --> 23:48.761
Rica ederim.

23:48.845 --> 23:51.430
Onun yerine siktir git desem? Olur mu?

23:53.432 --> 23:54.809
Kim olduğumu biliyor musun?

23:55.893 --> 23:57.019
Sana son bir fırsat.

23:58.020 --> 23:59.021
Ağlayacak lan bu.

23:59.147 --> 24:02.650
Şehir züppesi suratında
bir morluk daha istemezsin, değil mi?

24:04.819 --> 24:05.903
Ne oluyor ya?

24:12.451 --> 24:14.871
-Kardeşime dokunursan…
-Bırak onu!

24:14.996 --> 24:18.499
Ne yapıyorsun serseri?
Benim mekânımda kavga çıkaramazsın.

24:19.375 --> 24:20.960
Sakinleş ulan!

24:25.006 --> 24:26.007
-Baba, dinle.
-Defolun.

24:26.090 --> 24:28.467
-Bu şerefsiz porsuğun başını kopardı.
-Defolun.

24:28.593 --> 24:29.635
-Oğlun mu?
-Evet.

24:29.760 --> 24:32.096
-Kavga çıkardı.
-Yok öyle bir şey.

24:32.221 --> 24:33.472
Her yerde kamera var.

24:33.598 --> 24:34.807
-Defolun!
-Sakinleş!

24:34.932 --> 24:35.933
Tepemi attırma!

24:36.017 --> 24:37.101
Attırırsam ne…

24:39.020 --> 24:40.021
Gidiyoruz.

24:40.146 --> 24:41.856
-Tamam.
-Duydun mu? Hadi.

24:41.939 --> 24:42.940
-Evet.
-Yürüyün.

24:43.024 --> 24:44.025
Karını dinle moruk.

24:44.108 --> 24:45.109
Anne, ben bir şey yapmadım.

24:45.193 --> 24:46.569
-Hepsi onun suçu.
-Kolun nasıl?

24:46.819 --> 24:47.820
Porsuğum.

24:47.904 --> 24:48.946
Bırak.

25:02.168 --> 25:04.879
-Brady, bir saniye.
-Gidelim lütfen.

25:08.841 --> 25:09.842
Brady.

25:12.136 --> 25:14.180
-Ne oldu?
-Telefonumu unuttum.

25:14.513 --> 25:15.890
Hemen dönerim.

25:16.015 --> 25:19.060
Hayır Hutch. Hutch, dur! Sakın!

25:19.185 --> 25:21.938
Hayır! Gitme! Hayır!

25:40.331 --> 25:41.332
Kimler gelmiş…

25:41.415 --> 25:42.625
Siktir!

25:45.795 --> 25:47.505
Kahraman mı olmak istiyorsun?

25:52.051 --> 25:53.803
Polisi arayın!

25:57.139 --> 25:58.140
Hadi!

26:15.491 --> 26:16.492
Tanrım!

26:17.660 --> 26:18.744
Nasılmış bakalım?

26:19.287 --> 26:20.329
Hutch!

26:23.291 --> 26:24.458
Tanrı aşkına!

26:24.959 --> 26:25.960
Baba.

26:27.795 --> 26:31.299
Saldırıya uğrayan biziz,
biz niye buradayız?

26:31.424 --> 26:33.801
O zorbalar niye burada değil?

26:33.926 --> 26:37.138
-Suçlama yöneltecek misiniz?
-Oğlunuz şiddete meyilli mi?

26:37.430 --> 26:39.265
Oğlum… Şaka mı bu?

26:39.390 --> 26:40.433
Hanımefendi.

26:42.143 --> 26:44.270
Sadece bilgi topluyorum.

26:45.646 --> 26:47.064
-Rica etsem…
-Bir suçlama yoksa

26:47.189 --> 26:49.025
sorularınıza cevap vermeyeceğim.

26:49.442 --> 26:50.818
Tabii ki avukat hakkınız…

26:50.901 --> 26:54.280
Kardeşini korumak istemen çok doğal.

26:54.447 --> 26:56.907
İçgüdüsel bir şey bu.

26:57.033 --> 27:00.494
Ama işleri halletmenin
başka yolları var.

27:01.912 --> 27:03.205
Ciddi misin?

27:03.873 --> 27:06.834
Bana sakin ol diyorsun,
sonra millete dalıyorsun.

27:07.585 --> 27:10.046
Ki bence sağlam hareketti.

27:10.171 --> 27:13.007
-Öylece bodoslama…
-Hayır, değildi.

27:13.674 --> 27:15.176
Diyorum ki

27:15.760 --> 27:19.680
babandan daha iyi biri olmalısın.

27:23.142 --> 27:24.226
Neyse ya.

27:45.831 --> 27:48.501
Tamam. Hadi.

27:49.085 --> 27:50.461
Kalk.

27:50.586 --> 27:53.089
Sen gelmiyorsun, sadece baban.

28:03.182 --> 28:05.059
Otur şuraya.

28:14.568 --> 28:16.112
Kim olduğumu biliyor musun?

28:20.950 --> 28:26.163
Hayır ama şerif masasına
kurulduğuna göre nüfuzlu birisindir.

28:26.288 --> 28:27.706
Ha şunu bileydin.

28:27.832 --> 28:29.625
Adım Wyatt Martin.

28:30.751 --> 28:31.961
Bu kasaba benden sorulur.

28:32.086 --> 28:33.754
Ben de Hutch…

28:33.879 --> 28:37.716
Kim olduğunu biliyorum.
Oğlumu hırpalayan turistsin.

28:38.217 --> 28:39.718
-Bilmiyordum…
-Kes lan.

28:40.344 --> 28:42.138
Oğlun atari salonundaki…

28:42.263 --> 28:44.432
Kes lan sesini!

28:46.559 --> 28:49.019
Olayların bu noktaya
gelme sebebi oğlunun…

28:49.145 --> 28:51.605
Asıl senin oğlun arızalı.

28:51.730 --> 28:53.274
Eminim şu anda…

28:55.151 --> 28:58.195
Bu kasaba babamın eseridir
ve onun bir prensibi vardı.

28:59.071 --> 29:01.031
Turistleri hoş görmek.

29:01.157 --> 29:04.410
Sebebi malum, turizm
kasabanın başlıca geçim kaynağı.

29:05.119 --> 29:06.412
Ama bu…

29:07.246 --> 29:09.498
Oğlun… Adı Brady, değil mi?

29:09.623 --> 29:10.624
Evet.

29:10.708 --> 29:13.836
Oğlun Brady, benim oğlumun
top attığı kolunu sakatladı.

29:14.170 --> 29:15.379
Anlıyorum.

29:16.714 --> 29:17.715
Öyle mi?

29:18.632 --> 29:19.884
Evet, anlıyorum.

29:20.551 --> 29:22.595
Oğluma özür diletirim.

29:23.220 --> 29:25.723
Ama güvenlik kayıtlarını
incele lütfen.

29:25.848 --> 29:30.269
Güvenliklerden biri kızıma vurdu,
o yüzden kendimi kaybettim.

29:32.605 --> 29:34.106
Sen ne yapardın?

29:44.533 --> 29:46.118
Çıkarın şunları.

29:46.243 --> 29:48.496
Brady, gel.

29:50.664 --> 29:52.917
Konu kapandı mı yani? Gidebilir miyiz?

29:53.417 --> 29:56.420
Kendinize bir iyilik yapın
ve kasabayı terk edin.

30:06.972 --> 30:08.516
Çocukları topla.

30:08.641 --> 30:12.144
-Wyatt onları rahat bırakın demedi mi?
-Ne dediği sikimde değil.

30:12.228 --> 30:13.479
Kurtul onlardan.

30:21.070 --> 30:22.154
Çekme lütfen.

30:31.664 --> 30:33.791
Sana inanamıyorum.

30:34.750 --> 30:35.918
Daha ilk günden mi?

30:36.043 --> 30:37.044
Özür dilerim.

30:37.127 --> 30:39.713
Diğer yanını da
getirmek zorunda mıydın?

30:39.838 --> 30:43.092
Brady zaten agresifleşti,
sebebini biliyor musun?

30:44.760 --> 30:46.095
Senin yüzünden.

30:46.470 --> 30:49.932
Seni ve yaptıklarını izliyor.

30:50.057 --> 30:53.477
Birden kendimi kaybettim işte
ama geçti gitti.

30:53.769 --> 30:55.354
İş çantanda var?

30:57.606 --> 30:58.607
Ne?

30:59.817 --> 31:01.527
Siyah çantayı diyorum.

31:01.902 --> 31:03.195
-Saklamaya çalışıyorsun.
-O şey…

31:03.320 --> 31:05.906
-Söyle, ne?
-Buraya şeye gelmedim…

31:06.699 --> 31:08.075
Sana bir söz verdim.

31:08.200 --> 31:09.952
-Evet.
-Sözümü tutacağım.

31:10.786 --> 31:13.080
Evet, sözünü hatırlıyorum.

31:20.838 --> 31:22.089
Şarap mı?

31:23.299 --> 31:25.092
Sıradan bir şarap değil.

31:28.512 --> 31:29.888
Puglia'dan.

31:31.265 --> 31:32.516
Tanıştığımız yer.

31:33.434 --> 31:34.685
O yılın mahsulü.

31:46.655 --> 31:48.115
Özür dilerim.

31:51.118 --> 31:52.536
Bunu nereden buldun?

31:54.246 --> 31:55.664
-eBay'den.
-eBay mi?

31:55.789 --> 31:56.790
Evet.

31:57.333 --> 31:58.667
Kargoyla mı geldi yani?

31:58.792 --> 32:01.920
Evet… Altı haftada.

32:04.340 --> 32:06.258
Bunu planlamışsın.

32:09.595 --> 32:12.890
Tanıştığımız an
kim olduğunu biliyordum.

32:14.391 --> 32:16.393
Tehlikeli olduğunu.

32:17.269 --> 32:19.188
Kan içindeydin.

32:21.315 --> 32:22.608
Ne güzel günlerdi.

32:23.108 --> 32:24.693
Hakikaten güzel günlerdi.

32:30.366 --> 32:33.827
Anne, sen neymişsin öyle?
Resmen keskin nişancı çıktın.

32:38.165 --> 32:39.500
-Öyle mi dersin?
-Evet.

32:39.917 --> 32:42.920
Bu adil bir kavga değil.
Bu adil bir kavga değil.

32:43.045 --> 32:44.213
Onun tarafındayım!

32:53.389 --> 32:54.473
Sammy.

32:54.598 --> 32:56.183
Nereye gittin? Sammy?

32:56.308 --> 32:57.643
Sammy, beni bekle.

32:57.768 --> 32:59.728
Baba, bil bakalım neredeyim.

33:00.187 --> 33:01.563
Beni tufaya düşürdün!

33:01.855 --> 33:04.650
Demedim mi, burası harikalar diyarı.
Hadi gidelim.

33:04.775 --> 33:05.776
Hazır mısın?

33:08.862 --> 33:10.155
Çok tatlı çıktı.

33:21.625 --> 33:25.796
Dedeniz neler kaçırdığını bir bilse.
Ördek tekneler çok eğlencelidir.

33:26.088 --> 33:27.715
Güvenilir olsalar da…

33:27.840 --> 33:29.425
Dört bilet…

33:30.843 --> 33:33.512
Ama bu ördek tekne değil ki.

33:33.637 --> 33:35.347
Tepedeki ördeği gördün mü?

33:35.681 --> 33:39.935
Ama oğluma bunların
askerî araçlar olduğunu söyledim.

33:40.894 --> 33:43.147
Taarruz için kullanılırlar.

33:43.981 --> 33:47.025
Neyse, dört bilet, biri çocuk.

33:47.484 --> 33:49.653
Al, dağıt.

33:50.821 --> 33:53.907
-Gerçekten çok askerî bir araçmış.
-Evet.

33:54.324 --> 33:57.035
Vietnam'da savaşı
kesin bunun yüzünden kaybettik.

33:57.619 --> 34:00.456
Sadece birkaç kişilik yer kaldı.
Hadi binin.

34:00.581 --> 34:02.124
Umarım ıslanmaktan çekinmezsiniz.

34:03.834 --> 34:04.918
Evet.

34:05.544 --> 34:06.545
Teşekkürler.

34:10.174 --> 34:12.342
-Tatlım, şuraya otursana.
-Böyle iyi.

34:12.468 --> 34:13.469
Tamam.

34:13.552 --> 34:18.182
-Babamın dediği gibi otobüse benziyor.
-Resmen yüzen bir otobüs.

34:18.557 --> 34:19.767
Babanız nerede kaldı?

34:21.727 --> 34:23.061
Ne, gelmiyor musun?

34:23.187 --> 34:26.064
Tatlım, macchiato'nun yanında
çok churros yedim.

34:26.190 --> 34:27.691
Parkta buluşuruz.

34:28.066 --> 34:29.067
Ne?

34:29.151 --> 34:30.277
İyi eğlenceler.

34:30.694 --> 34:33.655
-Hoşça kal macchiato.
-Düzgün yemek ye!

34:56.762 --> 35:00.265
-Yolun sonuna geldin…
-Hadi eğlence başlasın!

35:00.390 --> 35:02.392
Birer yelek alın.

35:02.476 --> 35:03.477
-Yelek.
-İstemez.

35:03.560 --> 35:04.561
Pardon, izninizle.

35:04.645 --> 35:06.146
-Teşekkürler.
-İşte böyle.

35:06.271 --> 35:07.898
-Öne mi?
-Buyurun öne geçin.

35:08.023 --> 35:09.107
Kulaklıklar bankta.

35:09.233 --> 35:11.109
Arkada bir yer bulun
ve keyfinize bakın.

35:11.235 --> 35:13.612
Ayakta durabilirsiniz
ama sıkı tutunun.

35:13.737 --> 35:15.823
Birazdan yola çıkarız.

35:15.948 --> 35:17.074
Oturun.

35:23.872 --> 35:27.376
<i>Yelken açıyoruz.</i>

35:30.587 --> 35:35.300
<i>Plummerville göllerinde yapacağımız</i>
<i>bu gezide, rehberiniz ben olacağım.</i>

35:36.677 --> 35:37.803
Ne var ne yok millet?

35:38.637 --> 35:39.721
Ne yok ki?

35:41.223 --> 35:42.683
Sana kasabayı terk et dendi.

35:43.642 --> 35:46.353
Buna rağmen kasabada
hâlâ ne arıyorsun moruk?

35:48.772 --> 35:52.651
Buraya ailemle vakit geçirmeye,
anılar yaratmaya geldim.

35:54.987 --> 35:57.030
Arkadaş anı yaratmak istiyor.

35:57.155 --> 36:00.784
Bunlara hiç gerek yok.
Burada büyük bir yanlış anlaşılma var.

36:01.493 --> 36:02.494
Ben tatil…

36:04.329 --> 36:05.330
Ağır ol!

36:10.085 --> 36:11.086
Hadi ama!

36:14.882 --> 36:15.883
Hop!

36:16.174 --> 36:17.175
İletişim kur!

36:25.893 --> 36:27.352
Size boşuna mı para veriyorum!

36:27.477 --> 36:28.478
Karşında işte!

36:38.322 --> 36:41.825
<i>Aynen öyle.</i>
<i>Tereyağlı brownie ise en sevdiğimdir.</i>

36:51.668 --> 36:54.755
-Artık sopa kimseye yar olmayacak.
-Ama benim bıçağım var.

37:03.764 --> 37:05.015
Geberteceğim lan seni!

37:06.141 --> 37:10.062
<i>Bu sakin sularda tatlısu levreklerinin</i>
<i>dev bir türü yaşar.</i>

37:11.104 --> 37:13.649
Sakinleş artık.
Gel tatlı tatlı konuşalım.

37:13.774 --> 37:15.192
Çocukları düşün.

37:15.817 --> 37:16.818
Ne çocuğu be?

37:22.240 --> 37:23.450
Siktir!

37:32.417 --> 37:33.627
Seni şerefsiz…

37:41.343 --> 37:42.844
Bu iş böyle yapılır işte!

37:42.970 --> 37:45.305
Kıçı boklu bir turist demiştin lan!

37:45.722 --> 37:47.808
Abel da bana öyle dedi!

37:47.933 --> 37:50.602
Bize çok daha fazla
para vereceksin Dann.

37:50.727 --> 37:52.270
Dişimi kaybettim.

37:56.984 --> 37:59.027
SIKI TUTUN!

38:37.274 --> 38:38.442
Siktir, yapma!

38:40.152 --> 38:42.070
Hayır! Olamaz!

38:49.411 --> 38:50.912
Patronuna söyle,

38:51.038 --> 38:52.414
buraya

38:52.539 --> 38:54.207
tatil yapmaya

38:54.332 --> 38:55.584
geldim ulan!

39:02.007 --> 39:03.133
Dondurma alalım.

39:03.258 --> 39:05.802
-Neli olsun?
-Yaşasın! Dondurma!

39:05.927 --> 39:08.221
Ben çikolatalı istiyorum.

39:08.346 --> 39:11.141
Çikolatalı alırız.
Gelin bu taraftan gidelim.

39:11.725 --> 39:15.395
Pekâlâ. Ben çilekli alacağım.
Bir de vanilyalı.

39:22.319 --> 39:23.779
<i>Selam Harry.</i>

39:24.196 --> 39:28.450
<i>-Bu çaldığın trompet değil.</i>
-Kardeşim, bu duyduğun bir shamisen.

39:28.575 --> 39:30.827
<i>Osaka'dan yeni döndün tabii.</i>

39:30.952 --> 39:32.913
Aynen, beni bilirsin, çabuk öğrenirim.

39:33.914 --> 39:37.667
<i>-Ne haber?</i>
-Plummerville'i hatırlıyor musun?

39:38.001 --> 39:41.171
-Hayatımın en güzel haftalarındandı.
<i>-Benim de.</i>

39:41.630 --> 39:43.090
Hatırlıyorum da

39:43.215 --> 39:46.468
diğer çocukları
ve anne babalarını görünce

39:46.593 --> 39:49.054
bizim de
onlar gibi olduğumuzu düşünürdüm.

39:51.556 --> 39:55.519
Neyse, buraya geri döndüm

39:57.270 --> 40:01.024
<i>ama Plummerville hiç hatırladığım gibi</i>
<i>dost canlısı çıkmadı.</i>

40:01.900 --> 40:05.028
Oradan kaçakçılık günlerinden kalma
eski bir ticaret yolu geçiyor.

40:05.612 --> 40:08.865
Babamız bizi o biricik tatilimizde
niye oraya götürdü sanıyorsun?

40:09.908 --> 40:12.494
Burada görevde miydi yani?

40:12.619 --> 40:14.162
<i>Aynen öyle Hutch.</i>

40:14.871 --> 40:16.498
Şimdi anlaşıldı.

40:16.915 --> 40:20.168
<i>Oranın polisi</i>
<i>büyük bir şebekenin emrinde.</i>

40:20.293 --> 40:22.963
Dikkat etsene. O benim param değil.

40:23.088 --> 40:25.841
-Pardon patron. İstemeden oldu.
-Mal herif.

40:26.383 --> 40:29.052
<i>Senin gibi birinin</i>
<i>ortalığı kurcalamasını istemezler.</i>

40:37.644 --> 40:38.645
Nasıl gidiyor?

40:39.563 --> 40:42.524
Vay anasını,
bu çok büyük bir nakliyat!

40:44.442 --> 40:45.652
Şunun içinde ne var?

40:46.278 --> 40:49.865
Lendina'yı, INTERPOL'ün en çok
arananlar listesine sokacak şey.

40:52.033 --> 40:53.493
Harika.

40:54.244 --> 40:56.663
Yine sorun çıkarsa diye
adam göndereyim mi?

40:58.707 --> 40:59.708
Bana bak.

41:00.333 --> 41:03.253
Sen sorun çıkarmadıkça
sorun falan çıkmaz.

41:03.545 --> 41:05.172
Kimin patron olduğunu unutma.

41:06.882 --> 41:07.883
Anlaşıldı.

41:11.094 --> 41:12.429
Oğlumu almaya gitmeliyim.

41:14.389 --> 41:16.266
Bunlara göz kulak ol ve sorun çıkarma.

41:25.025 --> 41:26.234
Şunu alayım mı?

41:26.943 --> 41:27.986
Sağ ol.

41:28.111 --> 41:29.112
Sıcak.

41:29.196 --> 41:32.324
Babam sonunda
teşrif eder mi sence yoksa…

41:32.949 --> 41:34.201
Vahşi hayvanlar.

41:36.828 --> 41:38.914
Çok yaklaşma. Vahşi bir kurt köpeği o.

41:39.331 --> 41:41.208
Onu kilit altında tutmalıyız.

41:42.000 --> 41:44.502
Anne, babamla tanıştığında
sen de hayvan kurtarıyordun.

41:45.837 --> 41:47.714
Yaptığım şeylerden biri buydu.

41:48.381 --> 41:49.674
Aslında güvenlerini kazanırsan

41:50.342 --> 41:52.677
ve dünyanın
güvenli olduğunu gösterirsen…

41:52.802 --> 41:54.304
Güvenli bir dünya mı?

41:55.263 --> 41:56.514
Hangi dünyaymış o?

41:58.683 --> 42:00.769
Neyse, gel babanı bulalım.

42:04.648 --> 42:08.109
Bir turist yakalamışsın, duydum.
Çok direndi mi?

42:11.404 --> 42:13.448
Ne? Duyamıyorum.

42:14.908 --> 42:16.451
Kapat şunu.

42:17.369 --> 42:19.663
Kapat dedim! Yeni misin burada?

42:20.789 --> 42:22.374
Ne? Ne dedin?

42:23.291 --> 42:25.126
<i>Adam dişlerimi kırdı.</i>

42:26.461 --> 42:27.796
Dişlerine ne oldu?

42:28.171 --> 42:30.298
Dişlerimi döktü, anlasana. Adam…

42:30.423 --> 42:32.175
Adam hepimizi dövdü.

42:32.634 --> 42:34.886
Neden bahsediyorsun sen?

42:36.096 --> 42:39.557
Şu adamı diyorum,
bence o herif turist falan değil.

42:46.940 --> 42:47.941
Alo?

42:48.024 --> 42:49.818
<i>Bir sorunum var.</i>

42:49.943 --> 42:51.987
Kendin kaşındın diye tahmin ediyorum.

42:52.112 --> 42:56.366
<i>-Plummerville'i biliyor musun?</i>
-Arka yol olarak kullanılır.

42:56.825 --> 43:01.079
Kanada'dan gelen uyuşturucu,
silah, virüs ve daha beterleri

43:01.204 --> 43:02.872
oradan bilinmeyen yerlere dağılır.

43:03.331 --> 43:06.418
Anladım. Peki örgütün başı kim?

43:06.543 --> 43:07.669
<i>Katmanlı bir örgüt.</i>

43:09.129 --> 43:10.922
Örgütün başı büyük ihtimalle

43:11.047 --> 43:13.925
Lendina adında
nevi şahsına münhasır bir zat.

43:15.677 --> 43:16.928
Lendina mı?

43:26.855 --> 43:28.857
-Beyazlı adam mı?
-Evet efendim.

43:32.861 --> 43:35.613
-Yeni krupiye istemem.
-Bu masaya bir kadın dokunuşu lazım.

43:35.739 --> 43:37.532
Ama kazanıyorum. Şansım açıldı.

43:37.657 --> 43:38.908
Tebrikler.

43:39.034 --> 43:40.910
Şansınız hâlâ açık mı bakalım.

43:44.247 --> 43:46.041
Harika, kartları ayıralım.

43:47.375 --> 43:48.376
Elbette.

43:49.336 --> 43:51.504
-Kart ver.
-Yolculuğunuz nasıl geçiyor?

43:51.629 --> 43:52.630
Kes, sadece kart ver.

43:53.381 --> 43:56.634
<i>Plummerville, Lendina'nın</i>
<i>imparatorluğunda kritik bir yer.</i>

43:56.760 --> 43:58.178
Siktir ya.

44:00.764 --> 44:02.182
Bazen olur böyle.

44:03.391 --> 44:04.851
<i>Yalnız bir kurt.</i>

44:05.352 --> 44:07.979
Ona engel olabilecek bir güç

44:08.855 --> 44:09.856
yok gibi.

44:10.774 --> 44:13.943
<i>Rusların canlarını sıkarsan</i>
<i>evine silahlı baskın yaparlar.</i>

44:14.069 --> 44:17.364
<i>Lendina ve ekibi ise operasyonlarına</i>
<i>daha fazla zarar verirsen</i>

44:17.489 --> 44:23.203
aileni evinin ön bahçesinde infaz eder
ve sana da zorla izletirler.

44:27.207 --> 44:28.375
İşte bu.

44:29.918 --> 44:31.419
Paramı ver.

44:37.050 --> 44:38.551
Kazandın be.

44:39.260 --> 44:40.595
İnanın, haberim yoktu…

44:46.684 --> 44:47.727
Güvenlik!

44:49.687 --> 44:52.273
Kimse benim kumarhanemde hile yapamaz!

44:59.072 --> 45:01.574
Tansiyonu düşürmeni öneririm.

45:02.659 --> 45:07.372
Peki elinde herhangi bir istihbarat,
adres veya başka bir şey var mı?

45:08.248 --> 45:11.543
İşine yarar bir şey veririm
ama şunu bil,

45:13.378 --> 45:14.796
bu işte yalnızsın.

45:15.380 --> 45:19.676
Katil, bunu görmek
zorunda kaldığın için üzgünüm.

45:19.801 --> 45:23.888
Benim minik bebeğim
o kötü insanları hiç görmemeli.

45:24.013 --> 45:25.140
Hayır.

45:25.265 --> 45:26.808
İçeridekiler ne olacak?

45:27.434 --> 45:30.562
-Tanık kalmasın. Yakın.
-Anlaşıldı.

45:30.937 --> 45:32.522
Gel yürüyüşe çıkalım.

45:40.113 --> 45:42.073
Hızlı atıştı. Kolun acıdı mı?

45:42.657 --> 45:44.367
Hayır, iyiyim.

45:44.492 --> 45:45.869
Yine de acele etme.

45:46.369 --> 45:48.121
Baba, gerçekten iyiyim.

45:48.496 --> 45:50.165
Kolum iyi.

45:51.124 --> 45:52.125
Bir saniye.

45:56.129 --> 45:58.882
Max, bu telefona bakmam lazım.
Uzun sürmez.

45:59.966 --> 46:00.967
<i>Ne var?</i>

46:01.050 --> 46:05.305
İnsan hiç iş ortağıyla
böyle konuşur mu?

46:05.722 --> 46:06.973
Eski ortak.

46:07.098 --> 46:08.683
<i>Bu son nakliyem.</i>

46:09.476 --> 46:10.477
Tanrım.

46:10.560 --> 46:12.687
<i>Babamın borcu tamamıyla ödendi.</i>

46:13.646 --> 46:14.939
Saymayı biliyorum.

46:16.232 --> 46:18.359
Bu son nakliye

46:19.569 --> 46:21.488
sana olan borcumuzu kapatıyor.

46:23.114 --> 46:26.451
<i>Benim hesaplarıma göreyse</i>
<i>o borç asla kapanamaz.</i>

46:26.576 --> 46:29.496
Hayır! Bunun doğru olmadığını
sen de biliyorsun.

46:31.956 --> 46:34.000
Komik bir şey söylemedim.

46:35.293 --> 46:38.338
Baban, kafası karışık
olduğu için ölmüştü.

46:38.880 --> 46:42.008
-Senin de mi kafan karıştı yoksa?
<i>-Ben babam değilim.</i>

46:42.425 --> 46:43.551
Bu iş bitti.

46:45.470 --> 46:46.679
Pekâlâ.

46:47.639 --> 46:48.848
Görürüz.

46:49.933 --> 46:50.934
Yani…

46:53.478 --> 46:54.521
Alo?

47:01.778 --> 47:03.905
Max, nereye gidiyorsun?

47:14.207 --> 47:15.250
Şerif.

47:15.375 --> 47:16.918
<i>Bana Abel diyebilirsiniz.</i>

47:18.002 --> 47:22.840
Şerif, Wyatt kime çalıştığını
unutmasın istiyorum.

47:23.967 --> 47:26.803
<i>Onun için değerli olan bir şeyi</i>
<i>elinden al.</i>

47:27.262 --> 47:28.263
Anlaşıldı.

47:36.354 --> 47:37.605
Anne, sıra sende.

47:39.232 --> 47:40.942
-Anne?
-Efendim?

47:41.067 --> 47:42.652
Babamın başı yine belada mı?

47:43.653 --> 47:45.238
Niye sordun? Bir şey mi biliyorsun?

47:46.239 --> 47:47.824
Hayır, bilmediğimden… Hayır.

47:48.199 --> 47:49.367
Eminim baban…

47:52.704 --> 47:54.163
Dur tatlım, ben bakarım.

48:04.799 --> 48:06.551
Hamburger getirdim!

48:06.676 --> 48:09.596
Yanında da bisküvi arası
çikolata ve marşmelov!

48:09.721 --> 48:11.055
Besin deposu!

48:12.807 --> 48:14.767
Babanız gecikecek.

48:14.892 --> 48:16.853
Benimle gelin,

48:16.978 --> 48:19.272
söz pişman olmazsınız.

48:19.856 --> 48:21.232
Sammy, toplanmama yardım et.

48:21.357 --> 48:22.358
Hutch'la konuştun mu?

48:22.442 --> 48:25.612
-Sonra konuşuruz, hemen gitmeliyiz.
-Peki.

48:29.574 --> 48:30.950
İçeri gir,

48:31.784 --> 48:33.369
sakin ol.

48:34.370 --> 48:36.456
Aklı başında davran.

48:36.581 --> 48:39.167
Evet. Tansiyonu yükseltmek yok.

48:40.084 --> 48:41.878
Bilakis düşürüyoruz.

48:42.378 --> 48:44.380
Davranışlarımla örnek olmalıyım.

48:45.965 --> 48:48.635
"Arkadaşlar, bir yanlışlık oldu."

48:52.639 --> 48:56.225
Büyük bir nakliyat ama bir dahakine
kesinlikle daha büyüğünü yapabiliriz.

48:56.351 --> 48:58.353
Gerçi şu tablolar tam bir baş ağrısı.

48:58.728 --> 49:00.980
Bir de şunun içindekini görün.

49:04.233 --> 49:08.154
Karşınızda patron hanımın
istediği şey var.

49:08.946 --> 49:10.907
Wyatt'ın şımarık oğlu.

49:12.533 --> 49:15.370
Patrona lütfen şunu söyleyin,

49:15.495 --> 49:18.998
"Size hizmet etmek büyük keyifti."
Tamam mı?

49:19.791 --> 49:20.875
Anladınız mı?

49:22.126 --> 49:24.045
Yoksa tercüman mı çağırayım?

49:27.090 --> 49:29.050
Belli ki tercüman lazım.

49:31.094 --> 49:32.345
Arkadaşlar, bakar mısınız?

49:32.970 --> 49:34.764
Siktir! İçeri nasıl girdin?

49:35.473 --> 49:36.557
Kapıdan.

49:37.642 --> 49:38.643
Benzin mi bu?

49:39.352 --> 49:40.353
Zehir gibisin.

49:42.313 --> 49:43.606
PATLAYICI
MADDE

49:45.400 --> 49:48.027
İstersem tüm bu parayı yakarım.
Bir anda kül olur.

49:48.152 --> 49:50.488
Varillerde ne varsa patlar.

49:50.613 --> 49:52.615
Çok azınız buradan canlı çıkar.

49:52.990 --> 49:56.077
Çıkanlarınız da
Lendina'ya hesap verecektir.

49:57.286 --> 49:59.580
Herhâlde tüm bunlar onundur.

50:01.249 --> 50:03.167
O zaman ne istediğini söyle.

50:05.503 --> 50:06.587
Şey…

50:07.714 --> 50:09.173
Kafa dinlemek.

50:09.298 --> 50:10.466
Kafa dinlemek mi?

50:10.883 --> 50:13.261
Birazcık kafa dinlemek istiyorum.

50:13.886 --> 50:18.182
Buradan çıkarsam
beni ve ailemi rahat bırakacaksınız,

50:18.850 --> 50:20.435
tek isteğim bu.

50:20.560 --> 50:22.395
Tansiyonu düşürmek.

50:24.188 --> 50:25.857
Benimle kafa mı buluyorsun lan?

50:26.858 --> 50:30.486
Seninle tanışmamla
adamlarımı hastanelik etmen bir oldu,

50:30.611 --> 50:32.905
sıradan bir aile babası
olman imkânsız.

50:34.532 --> 50:36.659
Tansiyonu düşürecekmiş, siktir lan!

50:37.243 --> 50:39.871
Sen gelmeden önce
kasabada her şey sütlimandı.

50:41.122 --> 50:42.498
Nereye gitsem…

50:44.417 --> 50:47.211
İstesem seni
bir çırpıda öldürüveririm.

50:48.671 --> 50:49.672
Ama…

50:54.469 --> 50:55.595
Şanslı günündesin.

50:57.263 --> 50:58.931
Bugün iyiliğim üstümde.

51:02.518 --> 51:03.519
Git hadi.

51:04.228 --> 51:06.022
Gözüm görmesin seni.

51:08.691 --> 51:10.568
Fikrimi değiştirmeden defol git.

51:18.993 --> 51:20.203
Kaldırın lan şunu!

51:20.328 --> 51:21.454
Ya sabır!

51:21.579 --> 51:22.580
Hayır!

51:22.872 --> 51:23.956
İmdat! Kurtar beni!

51:24.957 --> 51:25.958
Kurtar beni!

51:26.042 --> 51:27.043
Hayır!

51:28.377 --> 51:29.378
Hayır!

52:05.331 --> 52:09.126
Bardağı taşırdın artık.
Sana defol demedim mi…

52:10.628 --> 52:12.296
Bu herif kim ya?

52:17.301 --> 52:18.511
Hayır, hayır!

52:19.220 --> 52:21.097
Lütfen, dur… Yapma!

52:22.223 --> 52:23.474
Dur! Yapma!

52:57.592 --> 52:58.885
Ha siktir!

53:39.050 --> 53:40.551
Gel hadi, gidelim!

53:49.602 --> 53:50.937
Dur lan şerefsiz!

54:15.795 --> 54:16.796
Siktir.

54:17.129 --> 54:18.130
Lanet olsun!

54:25.471 --> 54:27.056
PATLAYICI MADDE

54:30.851 --> 54:32.687
Siktir!

54:51.163 --> 54:52.289
Ne kadar kaybettik?

54:52.623 --> 54:54.917
Her şeyi kaybettik. Para, kimyasallar.

54:55.042 --> 54:56.293
Biyo-çanta.

54:56.419 --> 54:57.420
Olamaz.

54:57.503 --> 54:58.504
Hepsi gitti.

54:58.587 --> 55:02.008
Tüm adamlarımızı öldürüp
Wyatt'ın oğlunu kaçırdı.

55:07.263 --> 55:08.681
Kim bu manyak?

55:09.056 --> 55:10.599
Hakkında hiçbir şey bulamadık.

55:10.725 --> 55:12.727
Ama tuhaf bir detay tespit ettik.

55:14.103 --> 55:16.272
Yanında ailesi vardı.

55:16.522 --> 55:19.734
Yani kıymetli mallarım

55:19.859 --> 55:23.320
ailesiyle tatile gelen

55:23.446 --> 55:26.157
bir turist tarafından mı
havaya uçuruldu?

55:28.492 --> 55:31.078
Artık kimse oyunu
kurallarına göre oynamıyor mu?

55:31.704 --> 55:33.164
İyice tepem attı şimdi!

55:34.415 --> 55:38.586
Kim olduğunu bilmiyorum
ama fazla ileri gittin pislik herif.

55:39.086 --> 55:40.171
Şerif arıyor.

55:42.882 --> 55:46.802
-Bu tehdit hakkında ne biliyorsun?
-Hiçbir şey bilmiyorum.

55:46.927 --> 55:50.598
Ama elimdeki fotoğrafları
size yolladım. Adam hâlâ otelde.

55:50.723 --> 55:52.224
Bence bir ekip toplayın.

55:52.349 --> 55:57.063
Yanınızda kaç asker getirebilirsiniz?
Zira bu adam tam bir…

55:57.188 --> 55:58.689
<i>Uzatma be!</i>

55:58.814 --> 56:00.399
Hemen yola çıkıyorum.

56:00.858 --> 56:02.777
Bu herif süzme salak.

56:05.613 --> 56:07.323
-Selam oğlum.
-Kimler teşrif etmiş.

56:07.448 --> 56:09.492
Selam baba. Her şey yolunda mı?

56:09.909 --> 56:12.119
Hepimizin keyfi yerinde.

56:12.244 --> 56:15.372
Oğlun baltayı
tam bir oduncu gibi kullanıyor.

56:15.956 --> 56:16.957
Baba.

56:17.500 --> 56:18.959
-Sammy.
-Nerelerdeydin?

56:20.377 --> 56:24.048
Brady, bu Max.
Onu ben getirdim, ona iyi davran.

56:29.720 --> 56:32.014
-Küs değilsindir umarım.
-Değilim.

56:32.848 --> 56:33.974
İçeri geçelim.

56:34.517 --> 56:36.393
Gözünü kim morarttı köylü kardeş?

56:36.894 --> 56:37.895
Şaka şaka.

56:37.978 --> 56:39.313
Akşama kalacak mısın?

56:39.438 --> 56:44.610
Çok isterdim ama daha çok işim var.

56:46.278 --> 56:47.571
Orası kesin.

56:52.618 --> 56:54.495
Gel gidelim Sammy.

56:55.037 --> 56:56.330
Hadi yürü.

56:57.248 --> 56:59.375
Ateşi sen yakarsın.

57:10.010 --> 57:11.345
Bulaşmayacaktın Hutch.

57:12.012 --> 57:14.932
Tehlikeye bulaşmayacaktın!

57:15.349 --> 57:16.892
Niyetim…

57:18.477 --> 57:20.688
Hutch, söz vermiştin.

57:21.772 --> 57:23.065
Söz vermiştin.

57:24.525 --> 57:26.443
Sözünü tutmadın.

57:28.988 --> 57:30.531
Bu konuda…

57:32.032 --> 57:34.118
Kendimi kontrol edemiyorum.

57:34.243 --> 57:36.579
Bunu yeni fark ediyorum.

57:36.912 --> 57:39.123
Bence uzaklara gitmelisiniz,

57:41.834 --> 57:43.419
benden uzağa yani.

57:47.047 --> 57:48.507
Becca…

57:50.259 --> 57:53.137
Becca, bu bir rica değil.

57:56.307 --> 57:58.392
Bana ne yapacağımı söyleyemezsin.

57:59.602 --> 58:01.520
Pek çok şey olabilirsin.

58:02.688 --> 58:04.773
Ama her şeyden önce sen bir babasın.

58:06.025 --> 58:07.526
Benim erkeğimsin.

58:09.403 --> 58:10.738
O yüzden işleri yoluna koy.

58:18.162 --> 58:20.581
Hadi oğlum, telefonu aç.

58:21.957 --> 58:23.918
Hadi, aç!

58:37.973 --> 58:38.974
Sen!

58:39.600 --> 58:41.644
Kasabamda hâlâ ne işin var?

58:41.769 --> 58:43.520
Yardımın lazım desem…

58:46.065 --> 58:48.484
Dur, sakin ol. Oğlun bende.

58:49.652 --> 58:51.195
-Oğlun iyi.
-Oğluma ne yaptın lan?

58:51.320 --> 58:52.613
Seni geberteceğim!

58:53.280 --> 58:54.448
Hayır, yanlış anladın.

58:54.573 --> 58:56.533
Oğlun şu anda tamamen güvende…

58:57.451 --> 58:59.912
"Güvende" ne demek lan?

59:01.163 --> 59:02.915
Lendina'dan yani!

59:06.001 --> 59:08.796
İkimiz de aynı şeyi istiyoruz.

59:20.975 --> 59:22.518
Hepsini yaktın mı?

59:23.018 --> 59:24.019
Evet.

59:24.687 --> 59:25.980
Tüm parayı mı yaktın?

59:27.481 --> 59:29.692
Artı kimyasal varillerin içinde
ne varsa.

59:30.067 --> 59:31.235
Hepsi patladı.

59:31.318 --> 59:32.695
Hepsini mi yaktın?

59:33.654 --> 59:35.030
Oğlunu kurtardım.

59:37.241 --> 59:38.284
Sağ ol.

59:40.452 --> 59:42.579
O kadın tam bir şeytan.

59:44.123 --> 59:46.333
Babamı öldürdü.

59:46.458 --> 59:48.335
Abel'ı kullanarak oğlumu kaçırdı.

59:50.087 --> 59:52.047
Hain herif beni sattı.

01:00:01.307 --> 01:00:05.352
Babamdan bana miras kalan
bu imparatorluğun

01:00:06.228 --> 01:00:08.063
çok fazla borcu vardı.

01:00:09.356 --> 01:00:11.191
Vahşi Bill.

01:00:11.817 --> 01:00:15.070
Çok eğlenceli adamdı
ama kötü bir kumarbazdı.

01:00:18.282 --> 01:00:20.492
Onun hatalarının faturasını
hâlâ ben ödüyorum.

01:00:21.618 --> 01:00:25.331
İki kuşaktır bu kasaba
Lendina'nın emrinde çalışıyor.

01:00:25.456 --> 01:00:28.125
Oğlumun da bu kaderi yaşamasına
izin vermeyeceğim.

01:00:30.294 --> 01:00:31.503
Seni anlıyorum.

01:00:37.676 --> 01:00:41.388
Paralarını yaktığını öğrenince
Lendina ne yapar?

01:00:41.847 --> 01:00:43.474
Parayı sen yaktın.

01:00:44.016 --> 01:00:45.934
Peki. Ne yapar?

01:00:52.399 --> 01:00:54.318
Şey… Nasıl söylesem bilemedim.

01:00:56.695 --> 01:01:00.407
<i>Çok daha azı için</i>
<i>koca bir sülaleyi yok etmişliği var.</i>

01:01:01.367 --> 01:01:04.411
<i>O kadın zırdelidir.</i>

01:01:04.536 --> 01:01:05.829
Gaddardır.

01:01:10.918 --> 01:01:12.419
Şu anda nerede?

01:01:13.212 --> 01:01:15.381
Kesin buraya geliyordur.

01:01:20.052 --> 01:01:21.303
Efendim, vakit geldi.

01:01:36.860 --> 01:01:38.070
Yürüyün ulan.

01:01:38.195 --> 01:01:39.321
Hadi.

01:01:48.539 --> 01:01:50.999
Babam Lendina'yla
savaşmak için plan yapıyordu.

01:01:51.625 --> 01:01:53.252
Ama Lendina önce davrandı.

01:01:53.377 --> 01:01:54.378
HAVAİ FİŞEK

01:01:54.461 --> 01:01:57.005
Bunlar hâlâ çalışıyor mu bilmiyorum.

01:02:01.218 --> 01:02:02.386
Bence hiç deneme.

01:02:06.140 --> 01:02:09.184
<i>Onu Plummerville'deki</i>
<i>en tehlikeli yere çekeceğiz.</i>

01:02:09.309 --> 01:02:10.310
Tamirat var, kapalıyız.

01:02:10.436 --> 01:02:13.105
-Yeni geldik.
-Üzgünüm ama önce güvenlik.

01:02:13.230 --> 01:02:14.731
-Ücretsiz churros.
-Sitede bir şey yazmıyor.

01:02:14.857 --> 01:02:15.983
Para iadesi alacaksınız.

01:02:16.108 --> 01:02:17.359
Hadi, yürüyün.

01:02:25.909 --> 01:02:28.162
Burayla vedalaşmak zor olsa gerek.

01:02:28.579 --> 01:02:31.790
-Babam bizi buraya getirdiğinde…
-Burası tam bir lanet.

01:02:31.915 --> 01:02:35.335
Su parkı her yerinden sızdırıyor.
Güldüren aynalar başa bela.

01:02:35.461 --> 01:02:37.546
Çocuklar babalarının mirasını istemez.

01:02:37.629 --> 01:02:40.257
Sahiden mi? Bunu duyduğuma sevindim.

01:02:40.382 --> 01:02:41.758
Bu kim lan?

01:02:43.343 --> 01:02:44.344
Harry?

01:02:45.053 --> 01:02:47.306
Burası hatırladığımdan çok daha küçük.

01:02:47.431 --> 01:02:48.765
Gözlerime inanamıyorum!

01:02:49.850 --> 01:02:52.019
-Bu benim kardeşim Harry.
-Wyatt Martin.

01:02:52.686 --> 01:02:54.146
-Memnun oldum.
-Burada ne işin var?

01:02:54.271 --> 01:02:57.024
Varoluşsal bir kriz
yaşadığını hissettim.

01:03:05.365 --> 01:03:08.118
FRENİ SERBEST BIRAK

01:03:21.590 --> 01:03:23.383
Seninle biraz konuşalım. Bana bak.

01:03:24.551 --> 01:03:26.053
Aferin sana.

01:03:26.512 --> 01:03:28.096
Hadi, git bakalım.

01:04:13.976 --> 01:04:15.894
Baba, hatırlarsan bizi kulübede

01:04:16.019 --> 01:04:18.397
iki gece üst üste
yalnız başımıza bırakmıştın.

01:04:19.064 --> 01:04:21.900
Sadece sosisli
ve bisküvi arası marşmelovumuz vardı.

01:04:22.025 --> 01:04:23.527
Sanırım bu yüzden vegan oldum.

01:04:23.652 --> 01:04:26.697
Neticede güvendeydiniz ama.

01:04:27.239 --> 01:04:28.615
Büyük oranda yani.

01:04:28.740 --> 01:04:33.704
Bizim için endişelendin mi?
Yani nasıl insanlar olacağız diye.

01:04:33.829 --> 01:04:35.831
Brady için endişelenmen gibi mi?

01:04:35.956 --> 01:04:37.958
Evet. İstediğim şey onun…

01:04:38.792 --> 01:04:40.586
Senden daha iyi biri olması.

01:04:41.044 --> 01:04:42.045
Evet.

01:04:42.129 --> 01:04:44.214
Olacak da.

01:04:44.339 --> 01:04:46.133
İster inanın ister inanmayın,

01:04:46.925 --> 01:04:52.222
ikiniz de beni geçtiniz.

01:04:54.474 --> 01:04:56.560
Nereye gideceğini biliyor musun?

01:04:56.685 --> 01:04:57.811
-Bana bırak.
-Peki.

01:04:57.936 --> 01:04:59.104
Yukarıda yardım lazım mı?

01:04:59.771 --> 01:05:02.149
Aklımda başka bir şey var.

01:05:12.284 --> 01:05:14.745
Vakit geldi!

01:05:25.547 --> 01:05:26.548
Su parkındalar.

01:05:27.924 --> 01:05:29.259
Ne eğlenceli.

01:05:30.927 --> 01:05:31.928
O ne?

01:05:32.012 --> 01:05:33.055
Bir tür kulübe.

01:05:33.180 --> 01:05:34.598
Ailesi orada galiba.

01:05:36.308 --> 01:05:37.934
Bir ekip topla ve oraya git.

01:05:38.060 --> 01:05:39.853
-Kartoush…
-Efendim?

01:05:39.978 --> 01:05:41.188
Her şeyi yakıp yıkın.

01:05:42.230 --> 01:05:43.440
Herkesi öldürün.

01:05:44.191 --> 01:05:46.234
Açıp içine çikolata mı koyuyoruz?

01:05:46.735 --> 01:05:48.654
-Sıra sende.
-Tamam. Bende.

01:05:49.529 --> 01:05:50.614
Hadi o zaman.

01:05:51.782 --> 01:05:52.783
Hamleni biliyor musun?

01:05:52.908 --> 01:05:54.076
-Evet.
-İyi yakaladın.

01:05:54.201 --> 01:05:55.410
-Ama…
-Saldır.

01:05:55.535 --> 01:05:57.037
Buraya atla.

01:05:59.081 --> 01:06:00.082
Çocuklar.

01:06:00.874 --> 01:06:02.376
Yürüyüşe çıkıyorum.

01:06:02.459 --> 01:06:03.460
İyi eğlenceler.

01:06:03.543 --> 01:06:04.544
Ne?

01:06:05.462 --> 01:06:06.713
Çocuklar sana emanet.

01:06:09.925 --> 01:06:10.926
Tamam.

01:06:11.760 --> 01:06:13.512
-Dikkatli ol.
-İyi hamle.

01:06:17.432 --> 01:06:18.558
Berabere mi?

01:06:19.101 --> 01:06:20.644
-Evet.
-Sıkıntı yok. Berabere.

01:06:20.769 --> 01:06:22.020
Tamam. O zaman…

01:06:22.145 --> 01:06:23.397
AYI TÜFEĞİ

01:06:44.876 --> 01:06:46.169
Yeni tarzını sevdim.

01:06:46.294 --> 01:06:47.921
Sana çok yakışmış Abel.

01:06:49.131 --> 01:06:50.799
Seni çocuk kaçıran şerefsiz.

01:06:51.633 --> 01:06:52.634
Çok hoş.

01:06:53.385 --> 01:06:55.846
Bunu yaparak
dinamitin fitilini ateşledin.

01:06:56.221 --> 01:06:57.222
Hayır.

01:06:57.973 --> 01:07:02.227
Asıl beni hafife aldığın an
bunu sen yaptın.

01:07:03.145 --> 01:07:04.896
Yeterince

01:07:06.106 --> 01:07:07.274
itilip kakıldım.

01:07:08.567 --> 01:07:09.943
Şu andan itibaren

01:07:10.610 --> 01:07:12.154
patron benim ulan.

01:07:13.488 --> 01:07:16.616
Burası da benim kasabam.

01:07:17.534 --> 01:07:18.910
Silahlarınızı bana verin

01:07:19.786 --> 01:07:21.621
ve önüme düşüp arabaya yürüyün.

01:07:21.747 --> 01:07:23.415
Belki size bir çıkış yolu bulurum.

01:07:25.333 --> 01:07:26.626
O da belki.

01:07:27.085 --> 01:07:29.504
Ya kabul etmezsek?

01:07:30.797 --> 01:07:32.716
Kızılca kıyamet kopar.

01:07:37.929 --> 01:07:39.765
-Kopsun o zaman.
-Bana uyar.

01:07:50.734 --> 01:07:52.861
Bu herif de amma uyuz.

01:07:52.944 --> 01:07:54.780
<i>-İşini bitirin.</i>
-Anlaşıldı.

01:08:01.578 --> 01:08:02.579
Yürüyün!

01:08:03.246 --> 01:08:04.372
Çabuk! Hadi!

01:08:05.707 --> 01:08:06.708
Acele edin!

01:08:06.833 --> 01:08:07.834
Koşun!

01:08:32.734 --> 01:08:34.027
Devam et!

01:08:42.619 --> 01:08:43.620
Bu ne lan böyle?

01:08:44.538 --> 01:08:45.622
FRENİ SERBEST BIRAK

01:08:48.917 --> 01:08:50.126
Tanrım!

01:09:22.659 --> 01:09:23.660
Yürüyün!

01:09:33.336 --> 01:09:34.337
Olamaz.

01:09:34.713 --> 01:09:35.714
Ateş açın!

01:09:39.342 --> 01:09:40.343
Devam.

01:10:00.947 --> 01:10:02.282
Selam arkadaşlar!

01:10:04.576 --> 01:10:05.619
O ne lan?

01:10:17.380 --> 01:10:18.757
Saklanamazsın!

01:10:21.217 --> 01:10:22.427
Top havuzuna girdi!

01:10:22.552 --> 01:10:23.553
Çabuk!

01:10:28.767 --> 01:10:29.809
Vurun şunu!

01:10:31.937 --> 01:10:32.938
Siktir!

01:10:39.778 --> 01:10:42.072
-Wyatt, havuzda buluşalım.
<i>-Geliyorum.</i>

01:10:43.698 --> 01:10:45.325
Hadi çocuklar. Şimdi!

01:10:45.617 --> 01:10:46.618
Arkanı kolla!

01:10:55.293 --> 01:10:56.544
Aferin benim oğluma.

01:10:56.670 --> 01:10:58.380
Sana borcum olsun.

01:10:58.505 --> 01:10:59.589
Kaç buradan.

01:11:00.340 --> 01:11:01.758
Hadi, yürüyün!

01:11:04.678 --> 01:11:05.679
Geberin ulan!

01:11:09.391 --> 01:11:10.809
Şimdi elimize düştün göt!

01:11:14.729 --> 01:11:16.314
Öleceksin ihtiyar!

01:11:27.742 --> 01:11:29.327
Asıl sen öleceksin yavşak.

01:11:32.580 --> 01:11:33.581
Gördüm.

01:12:00.233 --> 01:12:01.234
Ha siktir!

01:12:09.409 --> 01:12:11.619
-Hutch!
-Baba, beni koru.

01:12:34.601 --> 01:12:35.602
Baba!

01:12:35.685 --> 01:12:36.728
Geber ulan!

01:12:37.062 --> 01:12:38.521
-Orada!
-Hâlâ hayatta.

01:12:38.646 --> 01:12:39.647
İşini bitirin!

01:12:39.731 --> 01:12:40.732
Hadi!

01:12:42.650 --> 01:12:43.818
Baba!

01:12:51.993 --> 01:12:54.537
İçeride kim varsa
bir daha dışarı çıkamayacak.

01:12:58.792 --> 01:13:00.877
<i>Mansell Aile Direktifleri,</i>

01:13:01.002 --> 01:13:04.923
<i>Sekizinci Prensip:</i>
<i>Karanlıkta korkunu lehine kullan.</i>

01:13:15.809 --> 01:13:17.519
Ne oluyor lan burada?

01:13:32.408 --> 01:13:35.703
<i>Zorluğu fırsata çevir.</i>

01:13:36.955 --> 01:13:38.665
<i>Beşinci Prensip.</i>

01:14:00.520 --> 01:14:02.897
Birader, yapma lütfen.

01:14:03.022 --> 01:14:04.858
Sadece işimi yapıyorum evlat.

01:14:06.192 --> 01:14:08.820
Max! Sammy'yi koru.

01:14:19.247 --> 01:14:22.250
Bana meydan okuyan son adamın
kellesini uçurdum.

01:14:22.417 --> 01:14:23.418
Al o zaman.

01:14:33.720 --> 01:14:38.349
Birinci Prensip der ki
katana düellosuna pala ile gidilmez.

01:14:44.355 --> 01:14:46.441
Lütfen beni öldürme.

01:15:00.496 --> 01:15:01.497
Ne haber yeğenim?

01:15:03.333 --> 01:15:05.335
Baban seninle gurur duyardı Brady.

01:15:05.460 --> 01:15:06.461
Wyatt.

01:15:07.503 --> 01:15:09.464
Bacağımdan vuruldum.

01:15:13.092 --> 01:15:14.093
Siktir.

01:15:14.677 --> 01:15:16.095
Tamam. Şunu yarana bastır.

01:15:16.221 --> 01:15:17.222
Sağ ol.

01:15:18.181 --> 01:15:20.266
-Pekâlâ. Silah dolu.
-Tamam.

01:15:20.391 --> 01:15:22.393
-Babama bakmaya gidiyorum.
-Tamam.

01:15:24.812 --> 01:15:25.813
Baba.

01:15:36.699 --> 01:15:37.825
Lendina?

01:15:41.621 --> 01:15:42.830
Seni kim yolladı?

01:15:45.166 --> 01:15:46.292
Hiç kimse.

01:15:46.584 --> 01:15:49.212
Ailemle tatile geldim,
anı yaratıyoruz.

01:15:49.671 --> 01:15:50.964
Senin burada ne işin var?

01:15:53.174 --> 01:15:54.801
Senin için geldim.

01:15:55.551 --> 01:15:58.388
Bu ufak imparatorluğumu çok seviyorum.

01:15:59.138 --> 01:16:00.932
İster ajan ister aile babası ol,

01:16:01.057 --> 01:16:04.769
hiçbir önemi yok.
Zira huzurumu kaçıranlardan

01:16:05.436 --> 01:16:08.815
hiç ama hiç hazzetmem.

01:16:09.899 --> 01:16:12.944
Ama işte ben böyle biriyim.

01:16:44.100 --> 01:16:46.311
Kimleri görüyorum.

01:16:46.436 --> 01:16:48.896
Anılar yaratmayı seven turistimiz.

01:16:49.022 --> 01:16:51.399
Plajda kokteyl içseydin ya.

01:16:51.524 --> 01:16:55.028
Her gittiğin yere

01:16:55.153 --> 01:16:57.905
yıkım götürüyorsun.

01:16:58.740 --> 01:17:02.535
Bu kasabanın işlerim için
önemini biliyor musun?

01:17:02.952 --> 01:17:04.871
Ne halt ettiğini sanıyorsun?

01:17:05.496 --> 01:17:07.623
FBI ajanı mısın, korucu musun nesin…

01:17:07.749 --> 01:17:10.168
Neysen ne, sen önemsiz birisin!

01:17:10.293 --> 01:17:11.627
Ve şimdi

01:17:12.628 --> 01:17:14.422
her şeyini kaybedeceksin.

01:17:14.964 --> 01:17:18.301
Neden peki, bilmek ister misin?

01:17:19.302 --> 01:17:22.013
Çünkü yanlış karının tekerine
çomak soktun.

01:17:25.475 --> 01:17:27.810
Gebertin şunu. Bu heriften gına geldi.

01:17:37.445 --> 01:17:39.530
Hayır!

01:17:40.531 --> 01:17:42.325
Siktir!

01:17:44.369 --> 01:17:45.912
Pislik.

01:17:53.503 --> 01:17:55.129
Kalkma lan göt.

01:17:55.755 --> 01:17:57.757
Yaptıkların yanına
kâr kalacak sanıyorsun.

01:17:58.800 --> 01:18:01.010
Sana temizinden bir ders vermek lazım.

01:18:03.429 --> 01:18:04.764
Anılarının da,

01:18:04.889 --> 01:18:06.224
ailenin de,

01:18:06.349 --> 01:18:09.102
senin de, hepinizin canı cehenneme.

01:18:09.644 --> 01:18:11.938
Geber artık.

01:18:17.985 --> 01:18:19.904
Bu ne be?

01:18:24.575 --> 01:18:25.910
Sen de kimsin?

01:18:29.747 --> 01:18:31.290
Biricik eşiyim.

01:18:43.010 --> 01:18:44.262
Becca!

01:19:04.031 --> 01:19:05.408
Kadını öldürün!

01:19:09.162 --> 01:19:11.456
Anne ayıya yamuk yapılmaz.

01:19:18.171 --> 01:19:19.172
Hutch!

01:19:19.464 --> 01:19:21.382
Patronu duydunuz, kadını öldürün.

01:19:21.674 --> 01:19:23.009
Dikkat!

01:19:23.593 --> 01:19:26.637
Patlayacak ulan!

01:19:26.762 --> 01:19:28.264
Deli <i>gringo'lar!</i>

01:20:03.174 --> 01:20:04.467
Kurtulacaklar mı?

01:20:04.717 --> 01:20:05.718
Evet.

01:20:05.801 --> 01:20:07.929
Mansell'lerin tatilleri böyle olur.

01:20:56.936 --> 01:20:58.604
<i>Bir daha sormayacağız.</i>

01:20:59.397 --> 01:21:00.565
<i>Siz kimsiniz?</i>

01:21:04.360 --> 01:21:06.362
Biz mi? Biz…

01:21:07.655 --> 01:21:08.864
Evliyiz.

01:21:08.990 --> 01:21:10.950
Evet. Evliyiz.

01:21:26.132 --> 01:21:27.133
Evet.

01:21:28.718 --> 01:21:31.178
<i>…niye Hutch ve Rebecca Mansell…</i>

01:21:35.808 --> 01:21:37.393
Ama efendim, bunu yapamam.

01:21:37.518 --> 01:21:41.647
Her yer ceset kaynıyor.
Savaş alanı gibi. Ben…

01:21:42.315 --> 01:21:43.608
<i>Sikimde değil!</i>

01:21:43.733 --> 01:21:44.734
Evet…

01:21:46.068 --> 01:21:47.320
Evet efendim. Anlıyorum.

01:21:48.154 --> 01:21:50.656
Çok net efendim. Evet.

01:21:59.332 --> 01:22:00.666
Serbestsiniz.

01:22:03.961 --> 01:22:05.129
Anahtarları getir.

01:22:06.297 --> 01:22:07.340
Kelepçeleri aç.

01:22:14.764 --> 01:22:17.141
Hutch. Bu tatil bitince…

01:22:17.266 --> 01:22:18.517
Evet?

01:22:19.435 --> 01:22:20.770
Bir tatile çıkmalıyız.

01:22:26.901 --> 01:22:27.902
Başardık!

01:22:29.737 --> 01:22:33.824
Plummerville'e gittik
ve tek parça döndük.

01:22:34.367 --> 01:22:36.577
Evet.

01:22:36.994 --> 01:22:38.663
-Neredeyse.
-Neredeyse.

01:22:38.788 --> 01:22:41.582
Bu sayede asla unutmayız.

01:22:41.707 --> 01:22:43.292
Sammy'ye bir alkış istiyorum.

01:22:43.417 --> 01:22:45.252
Bu fotoğrafta ne oluyor?

01:22:45.378 --> 01:22:47.922
Max'le Wyatt! Bir ara onları arayalım.

01:22:48.047 --> 01:22:50.383
Tatlım, bence yeterince
başlarını ağrıttık.

01:22:51.008 --> 01:22:54.345
Gelecek yaz tatilini iple çekiyorum.
Bize katılırsın, değil mi dede?

01:22:54.470 --> 01:22:56.514
-Elbette Sammy!
-O top havuzunu özledim.

01:22:56.639 --> 01:22:58.015
Şuna bakın.

01:22:58.140 --> 01:23:00.518
Bu anı hiç hatırlamıyorum.
Sen mi çektin?

01:23:01.060 --> 01:23:02.269
-Çok iyi.
-Evet.

01:23:02.728 --> 01:23:04.021
Profesyonel fotoğrafçı.

01:29:18.937 --> 01:29:20.939
Çevirmen: Berkcan Navarro

  </script>
